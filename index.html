<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAWKEYE GCS Master</title>
    <!-- Masukkan CSS Navbar dan GCS di sini -->
    <link rel="stylesheet" href="/static/css/navbar.css">
    <link rel="stylesheet" href="/static/css/gcs.css">
    <script src="/static/js/socket.io.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #0a0a1a; }
        iframe { border: none; width: 100%; height: 100%; flex-grow: 1; }
    </style>
</head>
<body>
    
    <!-- Render Navbar di Master -->
    <!-- {% include 'navbar.html' %} -->
     <div id="navbar-placeholder"></div>

    <!-- Iframe tempat halaman anak (flightview, mission, dll) diputar -->
    <!-- Default URL arahkan ke route Flask untuk FlightView -->
    <iframe id="main-frame" src="/flightview"></iframe>

    <script src="/static/js/gcs.js"></script>
    <script src="/static/js/radio-mavlink.js"></script>
    <script src="/static/js/command.js"></script>
    <script>
        // Instance RadioMavlink dibuat SEKALI di sini (parent, persist lintas
        // navigasi iframe) -- pola sama persis dengan window.gcsConnection.
        // setup.html mengaksesnya lewat window.parent.radioMavlink.
        window.radioMavlink = new RadioMavlink();
        // Coba sambung ulang otomatis ke radio yang SUDAH PERNAH di-approve
        // user sebelumnya (getPorts(), bukan requestPort() -- tidak butuh
        // klik baru). Kalau belum pernah approve port apapun, ini no-op diam-diam.
        window.radioMavlink.tryAutoReconnect().catch(() => {});

        // HAPUS inisialisasi ulang window.gcsConnection dan initSocketIO di sini.
        // gcs.js sudah mengurus semuanya dengan sempurna.
        fetch('navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Gagal memuat navbar:', error));

        let iframeReady = false;          
        const logQueue = [];              

        document.addEventListener('DOMContentLoaded', function() {
            const frame = document.getElementById('main-frame');
            if (frame) {
                frame.addEventListener('load', function() {
                    iframeReady = true;
                    console.log('Iframe ready');
                    
                    // Kirim semua log yang tertunda setelah iframe siap
                    while (logQueue.length > 0) {
                        const queued = logQueue.shift();
                        if (frame.contentWindow && typeof frame.contentWindow.updateMavlogUI === 'function') {
                            frame.contentWindow.updateMavlogUI(queued);
                        }
                    }
                });
            }

            // Timpa fungsi onMavlog dari gcs.js untuk menambahkan fitur antrean (Queue)
            window.gcsConnection.onMavlog = (logItem) => {
                const frame = document.getElementById('main-frame');

                // Jika iframe belum siap, simpan ke antrian
                if (!iframeReady) {
                    logQueue.push(logItem);
                    return;
                }

                // Kirim log saat ini
                if (frame.contentWindow && typeof frame.contentWindow.updateMavlogUI === 'function') {
                    frame.contentWindow.updateMavlogUI(logItem);
                }
            };

            // ===== Routing data RADIO (jalur independen, terpisah dari Pi) =====
            // Pakai queue yang sama (iframeReady/logQueue) supaya konsisten
            // dengan penanganan onMavlog dari gcsConnection di atas.
            window.radioMavlink.onTelemetry = (data) => {
                const frame = document.getElementById('main-frame');
                if (frame?.contentWindow?.updateTelemetryUI) {
                    // adaptRadioTelemetry (didefinisikan di gcs.js) memetakan
                    // format raw radio-mavlink.js -> format data_store Python
                    // (mode->flight_mode, armed->is_armed, attitude rad->roll/pitch/yaw deg, dst)
                    frame.contentWindow.updateTelemetryUI(window.adaptRadioTelemetry(data));
                }
            };

            window.radioMavlink.onMavlog = (logItem) => {
                const frame = document.getElementById('main-frame');
                if (!iframeReady) {
                    logQueue.push(logItem);
                    return;
                }
                if (frame?.contentWindow?.updateMavlogUI) {
                    frame.contentWindow.updateMavlogUI(logItem);
                }
            };

            window.mavFeature = new MavlinkFeatures({
                baseUrl: window.gcsConnection?.baseUrl || window.location.origin,
                useRadio: true
            });
            console.log('[MAV] Features mode:', window.mavFeature.getMode());

            if (window.radioMavlink) {
                window.radioMavlink.tryAutoReconnect().then(connected => {
                    if (connected && window.mavFeatures) {
                        window.mavFeatures._mode = 'radio';
                        window.mavFeatures._radio = window.radioMavlink;
                        console.log('[MAV] Auto-connected via radio');
                    }
                }).catch(() => {});
            }

            // Sinkronisasi status navbar secara periodik
            setInterval(() => {
                updateNavbarStatus();
                // Update mode mavFeatures jika koneksi berubah
                if (window.mavFeatures) {
                    if (window.radioMavlink?.telemetry?.connected) {
                        window.mavFeatures._mode = 'radio';
                    } else if (window.gcsConnection?.isConnected) {
                        window.mavFeatures._mode = 'backend';
                    }
                }
            }, 2000);
        });

        function navigateTo(url, el) {
            document.getElementById('main-frame').src = url;
            document.querySelectorAll('.nav-left a').forEach(a => a.classList.remove('active'));
            if(el) el.classList.add('active');
            const camBtn = document.getElementById('nav-camera');
            if (url === '/flightview') {
                camBtn.style.display = 'inline-block';
            } else {
                camBtn.style.display = 'none';
            }
        }

        function triggerCamera() {
            // WebRTC/kamera -- JALUR TERPISAH, tidak boleh tercampur dengan
            // logic connect telemetry (radio/UDP) di bawah ini.
            const frame = document.getElementById('main-frame');
            if (frame.contentWindow && typeof frame.contentWindow.openVideo === 'function') {
                frame.contentWindow.openVideo();
            }
        }

        function toggleConnType() {
            const type = document.getElementById('connTypeSelect').value;
            document.getElementById('serialGroup').style.display = (type === 'serial') ? 'flex' : 'none';
            document.getElementById('ipGroup').style.display = (type === 'ip') ? 'flex' : 'none';
            updateNavbarStatus();
        }

        // ============================================================
        // RADIO (Serial) -- Web Serial API, murni di browser.
        // TIDAK PERNAH mengirim apapun ke backend Pi. Kalau kamu buka
        // terminal Flask dan berharap lihat log di sini, itu keliru --
        // cek Console browser (F12) untuk log dari radio-mavlink.js.
        // ============================================================
        async function handleSelectRadioPort() {
            if (!window.radioMavlink) { alert('Modul radio-mavlink.js belum termuat.'); return; }
            if (!('serial' in navigator)) {
                alert('Browser tidak mendukung Web Serial API. Pakai Chrome/Edge di desktop.');
                return;
            }
            try {
                await window.radioMavlink.requestPort();
                const select = document.getElementById('portSelect');
                if (select) select.innerHTML = '<option value="selected" selected>Port radio dipilih</option>';
            } catch (err) {
                console.log('Pemilihan port radio dibatalkan:', err); // user cancel popup, bukan error
            }
        }

        async function connectRadio() {
            const statusEl = document.getElementById('statusText');
            if (!window.radioMavlink || !window.radioMavlink.port) {
                alert('Pilih port radio dulu (tombol "Pilih Port").');
                return;
            }
            const baud = parseInt(document.getElementById('baudSelect').value, 10);
            statusEl.textContent = 'Connecting radio...';
            try {
                await window.radioMavlink.connect(baud);
                // Setelah konek, pastikan mavFeatures menggunakan radio
                if (window.mavFeatures) {
                    window.mavFeatures._mode = 'radio';
                    window.mavFeatures._radio = window.radioMavlink;
                }
            } catch (err) {
                alert('Gagal connect radio: ' + err.message);
            }
            updateNavbarStatus();
        }

        async function disconnectRadio() {
            if (window.radioMavlink) {
                await window.radioMavlink.disconnect();
                if (window.mavFeatures) {
                    window.mavFeatures._mode = 'none';
                }
            }
            updateNavbarStatus();
        }

        // ============================================================
        // UDP/IP -- dikirim ke backend Pi lewat window.gcsConnection
        // (jalur asli, tidak berubah -- Pi yang buka koneksi ke ESP32)
        // ============================================================
        async function connectUdp() {
            await window.gcsConnection.connectIP();
            if (window.mavFeatures) {
                window.mavFeatures._mode = 'backend';
                window.mavFeatures._backend = window.gcsConnection;
            }
            updateNavbarStatus();
        }

        async function disconnectUdp() {
            await window.gcsConnection.disconnect();
            if (window.mavFeatures) {
                window.mavFeatures._mode = 'none';
            }
            updateNavbarStatus();
        }

        // ============================================================
        // SWITCH -- satu tombol Connect, aksinya ikut dropdown yang dipilih
        // ============================================================
        async function handleMainConnect() {
            const type = document.getElementById('connTypeSelect').value;
            const isRadioConnected = !!(window.radioMavlink && window.radioMavlink.telemetry?.connected);
            const isUdpConnected = !!(window.gcsConnection && window.gcsConnection.isConnected);

            if (type === 'serial') {
                if (isRadioConnected) {
                    await disconnectRadio();
                } else {
                    await connectRadio();
                }
            } else {
                if (isUdpConnected) {
                    await disconnectUdp();
                } else {
                    await connectUdp();
                }
            }
            // Setelah koneksi berubah, update status dan pastikan mavFeatures juga aware
            updateNavbarStatus();
        }

        function updateNavbarStatus() {
            const type = document.getElementById('connTypeSelect')?.value;
            const statusEl = document.getElementById('statusText');
            const connectBtn = document.getElementById('connectBtn');
            if (!statusEl || !connectBtn) return;

            if (type === 'serial') {
                const connected = !!(window.radioMavlink && window.radioMavlink.telemetry?.connected);
                statusEl.textContent = connected ? 'Connected' : 'Disconnected';
                connectBtn.textContent = connected ? 'Disconnect' : 'Connect';
            } else {
                const connected = !!(window.gcsConnection && window.gcsConnection.isConnected);
                statusEl.textContent = connected ? 'UDP Connected' : 'UDP Disconnected';
                connectBtn.textContent = connected ? 'Disconnect' : 'Connect';
            }
        }

        // Refresh berkala -- navbar tetap konsisten walau pindah halaman/iframe reload
        setInterval(updateNavbarStatus, 1500);
        document.addEventListener('DOMContentLoaded', () => setTimeout(updateNavbarStatus, 500));
    </script>
</body>
</html>
